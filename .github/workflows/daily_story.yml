name: Daily Story Blog Automation

on:
  schedule:
    - cron: '30 3 * * *' # Runs daily at 3:30 AM UTC (9:00 AM IST)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  generate-and-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants git push permissions back to repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: "llama-3.3-70b-versatile"
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SMTP_SERVER: "smtp.gmail.com"
          SMTP_PORT: 587
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          BLOG_LENGTH_MIN: 1500
          BLOG_LENGTH_MAX: 3000
          CATEGORY_SELECTION_METHOD: "sequential"
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blogs/ config/state.json logs/ || true
          
          # Only commit and push if there are changes staged
          if git diff --staged --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "Auto-generated daily story blog: $(date +'%Y-%m-%d')"
            git push
          fi
